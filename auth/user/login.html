<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Appnetick</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
background:#0b141a;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* LANGUAGE */
.lang{
position:absolute;
top:20px;
font-size:14px;
color:#ccc;
cursor:pointer;
}

/* CONTAINER */
.container{
width:100%;
max-width:350px;
padding:20px;
text-align:center;
}

/* LOGO */
.logo img{
width:80px;
margin:15px 0;
}

/* INPUT */
input{
width:100%;
padding:12px;
margin:12px 0;
border:none;
border-radius:10px;
background:#1f2c33;
color:#fff;
}

/* BUTTON */
button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:35px;
background:#2196f3;
color:#fff;
font-weight:700;
}

/* LINK */
.link{
margin-top:15px;
display:block;
color:#2196f3;
cursor:pointer;
}

/* BOTTOM SHEET */
.sheet{
position:fixed;
bottom:-100%;
left:0;
width:100%;
background:#111;
padding:20px;
border-radius:20px 20px 0 0;
transition:0.3s;
}

.sheet.active{bottom:0;}

.sheet div{
padding:12px;
border-bottom:1px solid #333;
cursor:pointer;
}

</style></head><body><div class="lang" onclick="toggleSheet()">English ▼</div><div class="container"><div class="logo">
<img src="/20260313_121958.jpg">
</div><h2>Welcome Back</h2><input type="email" placeholder="Email">
<input type="password" placeholder="Password"><button>Login</button>

<span class="link" onclick="location.href='/auth/user/signup'">
Create new account
</span></div><!-- LANGUAGE SHEET --><div class="sheet" id="sheet">
<div onclick="setLang('English')">English</div>
<div onclick="setLang('Hindi')">Hindi</div>
<div onclick="setLang('Spanish')">Spanish</div>
</div><script>
function toggleSheet(){
document.getElementById("sheet").classList.toggle("active");
}

function setLang(lang){
document.querySelector(".lang").innerText = lang + " ▼";
toggleSheet();
}
</script></body>
</html>
