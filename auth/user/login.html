<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Appnetick</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
background:#0b141a;
color:#fff;
}

/* SAME TOOLBAR */
.toolbar{
position:sticky;
top:0;
display:flex;
align-items:center;
justify-content:space-between;
padding:12px 16px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border-bottom:1px solid rgba(255,255,255,0.1);
z-index:1000;
}

.toolbar .title{
font-weight:700;
font-size:18px;
}

.toolbar img{
width:35px;
height:35px;
border-radius:50%;
}

/* MAIN */
.container{
padding:25px;
max-width:400px;
margin:auto;
}

/* HEADINGS */
.heading{
font-size:26px;
font-weight:700;
margin-top:20px;
}

.desc{
color:#aaa;
margin-top:8px;
font-size:14px;
line-height:1.5;
}

/* INPUT */
input{
width:100%;
padding:14px;
margin-top:18px;
border:none;
border-radius:12px;
background:#1f2c33;
color:#fff;
}

/* BUTTON */
button{
width:100%;
padding:14px;
margin-top:20px;
border:none;
border-radius:35px;
background:#2196f3;
color:#fff;
font-weight:700;
}

/* SWITCH */
.switch{
margin-top:15px;
text-align:center;
color:#2196f3;
cursor:pointer;
}

/* FOOTER */
.footer{
position:fixed;
bottom:20px;
width:100%;
text-align:center;
font-size:14px;
}

.footer span{
color:#2196f3;
cursor:pointer;
}

</style></head><body><!-- TOOLBAR --><div class="toolbar">
<div class="title">Appnetick</div>
<img src="/20260313_121958.jpg">
</div><div class="container"><div class="heading">Login with your account</div><div class="desc">
Access your Appnetick account and continue chatting, sharing, and exploring the platform.
</div><input type="email" placeholder="Email">
<input type="password" placeholder="Password"><button>Login</button>

<div class="switch">Use mobile instead</div></div><div class="footer">
Don't have an account? 
<span onclick="location.href='/auth/user/signup'">Sign Up</span>
</div></body>
</html>
