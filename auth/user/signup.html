<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - Appnetick</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet"><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
background:#0b141a;
color:#fff;
display:flex;

align-items:center;
height:100vh;
}

.container{
width:100%;
max-width:350px;
padding:20px;
text-align:center;
}

.logo{
font-size:28px;

</span></div></body>
