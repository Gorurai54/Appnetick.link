<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Appnetick Profile</title>
  <link rel="icon" href="/20260313_121958.jpg">


<meta property="og:site_name" content="Appnetick">
  <meta property="og:image" content="IMAGE_URL">
<meta property="og:title" content="User Profile">
<meta property="og:description" content="View profile on Appnetick">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://unpkg.com/@phosphor-icons/web"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#0b141a;
color:#fff;
overflow-x:hidden;
}

.container{
max-width:600px;
margin:auto;
padding-bottom:40px;
}

/* TOOLBAR */
.topbar{
height:60px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 16px;
position:sticky;
top:0;
z-index:1000;
background:rgba(0,0,0,0.45);
backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);
border-bottom:1px solid rgba(255,255,255,0.08);
}

.logo{
font-size:22px;
font-weight:700;
color:#2196f3;
cursor:pointer;
}

.top-icons{
display:flex;
gap:15px;
font-size:24px;
}

.top-icons i{
cursor:pointer;
}

/* PROFILE SECTION */
.profile-header{
padding:40px 20px 20px;
text-align:center;
}

.profile-image{
width:130px;
height:130px;
border-radius:50%;
object-fit:cover;
border:4px solid rgba(255,255,255,0.1);
box-shadow:0 0 30px rgba(33,150,243,0.15);
}

.name{
margin-top:18px;
font-size:28px;
font-weight:700;
color:#fff;
}

.username{
margin-top:6px;
font-size:15px;
color:#2196f3;
font-weight:600;
}

.bio{
margin-top:16px;
font-size:15px;
line-height:1.8;
color:#cfcfcf;
padding:0 10px;
}

/* STATS */
.stats{
display:flex;
justify-content:center;
gap:18px;
margin-top:28px;
padding:0 15px;
}

.stat{
flex:1;
max-width:120px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.06);
border-radius:18px;
padding:18px 10px;
backdrop-filter:blur(15px);
}

.stat h2{
font-size:24px;
font-weight:700;
color:#fff;
}

.stat p{
margin-top:5px;
font-size:13px;
color:#aaa;
}

/* INFO CARD */
.info-card{
margin:30px 20px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.06);
border-radius:20px;
padding:20px;
backdrop-filter:blur(20px);
}

.info-title{
font-size:18px;
font-weight:700;
margin-bottom:15px;
color:#fff;
}

.info-row{
padding:12px 0;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.info-row:last-child{
border-bottom:none;
}

.info-label{
font-size:13px;
color:#888;
margin-bottom:5px;
}

.info-value{
font-size:15px;
color:#fff;
word-break:break-word;
}

/* LOADING */
.loading{
opacity:0.6;
}

</style>

</head>

<body>

<div class="container">

<!-- TOP BAR -->
<div class="topbar">

<div class="logo"
onclick="location.href='/'">
Appnetick
</div>

<div class="top-icons">
<i class="ph ph-user"></i>
</div>

</div>

<!-- PROFILE -->
<div class="profile-header">

<img class="profile-image" id="profileImg"
src="https://via.placeholder.com/120">

<div class="name" id="name">Loading...</div>

  <div class="username" id="usernameTop">@user</div>

<div class="bio" id="bio">Please wait...</div>

<!-- STATS -->
<div class="stats">

<div class="stat">
<h2 id="posts">0</h2>
<p>posts</p>
</div>

<div class="stat">
<h2 id="followers">0</h2>
<p>followers</p>
</div>

<div class="stat">
<h2 id="following">0</h2>
<p>following</p>
</div>

</div>

</div>

</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
get
} 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* YOUR EXACT FIREBASE CONFIG (NO CHANGE) */
const firebaseConfig = {
apiKey: "AIzaSyBGIQFj6syU2231sov7c5i_90O0s6olCxlM",
authDomain: "appnetick.firebaseapp.com",
databaseURL: "https://appnetick-default-rtdb.firebaseio.com",
projectId: "appnetick",
storageBucket: "appnetick.firebasestorage.app",
messagingSenderId: "816276009696",
appId: "1:816276009696:web:db763c2ae70d2b944c9685"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* UID FROM URL */
const params = new URLSearchParams(window.location.search);
const uid = params.get("uid");;
async function loadProfile(){

if(!uid){
document.getElementById("name").innerText = "No UID";
return;
}

const snap = await get(ref(db, "Users/" + uid));

if(snap.exists()){

const data = snap.val();

/* 🔥 EXACT YOUR FIREBASE FIELDS */
document.getElementById("name").innerText = data.full_name || "No Name";
document.getElementById("usernameTop").innerText = data.Username || "user";
document.getElementById("bio").innerText = data.email || "";

// ✅ PROFILE IMAGE FIX
  document.getElementById("profileImg").src =
    data.avatar ||
    data.profilePic ||
    data.photo ||
    "https://via.placeholder.com/120";


/* stats (optional) */
document.getElementById("posts").innerText = 0;
document.getElementById("followers").innerText = 0;
document.getElementById("following").innerText = 0;

}else{

document.getElementById("name").innerText = "User Not Found";
document.getElementById("bio").innerText = "";

}

}

loadProfile().catch(console.error);

</script>

</body>
</html>
