<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Appnetick Profile</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://unpkg.com/@phosphor-icons/web"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{

background:#000814;
color:white;
overflow-x:hidden;

}

.container{

max-width:500px;
margin:auto;
padding-bottom:100px;

}

/* Top Bar */

.topbar{

height:70px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 18px;
position:sticky;
top:0;
z-index:100;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(20px);

}

.left-top{

display:flex;
align-items:center;
gap:14px;

}

.top-icon{

font-size:34px;
color:white;

}

.username-top{

font-size:22px;
font-weight:700;

}

.right-top{

display:flex;
align-items:center;
gap:18px;

}

.icon-wrap{

position:relative;

}

.badge{

position:absolute;
top:-8px;
right:-8px;
background:#ff3040;
width:22px;
height:22px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
font-weight:700;

}

/* Profile Header */

.profile-header{

padding:20px 18px 0;

}

.profile-row{

display:flex;
justify-content:space-between;
align-items:center;

}

.profile-left{

position:relative;

}

.profile-image{

width:105px;
height:105px;
border-radius:50%;
object-fit:cover;
border:3px solid #222;

}

.add-btn{

position:absolute;
right:0;
bottom:4px;
width:34px;
height:34px;
border-radius:50%;
background:white;
display:flex;
justify-content:center;
align-items:center;
border:4px solid #000814;

}

.add-btn i{

color:black;
font-size:20px;

}

/* Stats */

.stats{

display:flex;
gap:35px;

}

.stat{

text-align:center;

}

.stat h2{

font-size:26px;
font-weight:700;

}

.stat p{

margin-top:2px;
font-size:17px;
color:#d0d0d0;

}

/* Name */

.name{

margin-top:18px;
font-size:22px;
font-weight:700;

}

.bio{

margin-top:8px;
font-size:17px;
line-height:1.6;
color:#f0f0f0;

}

.link{

margin-top:8px;
display:flex;
align-items:center;
gap:8px;
color:#70a7ff;
font-size:18px;
font-weight:500;

}

.link i{

font-size:20px;

}

/* Buttons */

.buttons{

display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:12px;
margin-top:18px;

}

.btn{

height:48px;
border-radius:14px;
border:1px solid #262626;
background:#111827;
display:flex;
align-items:center;
justify-content:center;
gap:8px;
font-size:17px;
font-weight:600;
color:white;

}

.btn i{

font-size:20px;

}

/* Dashboard */

.dashboard{

margin-top:20px;
background:#1f2937;
padding:18px;
border-radius:18px;

}

.dashboard h3{

font-size:24px;
font-weight:700;

}

.dashboard p{

margin-top:8px;
font-size:17px;
color:#b0b0b0;

}

/* Story */

.story-wrap{

display:flex;
gap:18px;
overflow-x:auto;
padding:24px 18px 0;

}

.story-wrap::-webkit-scrollbar{
display:none;
}

.story{

min-width:90px;
text-align:center;

}

.story-circle{

width:90px;
height:90px;
border-radius:50%;
padding:3px;
background:linear-gradient(45deg,#444,#888);

}

.story-circle img{

width:100%;
height:100%;
border-radius:50%;
object-fit:cover;
border:3px solid #000814;

}

.story-add{

display:flex;
align-items:center;
justify-content:center;
font-size:42px;
background:#000814;
border:2px solid white;

}

.story p{

margin-top:10px;
font-size:16px;
white-space:nowrap;

}

/* Tabs */

.tabs{

margin-top:26px;
display:flex;
justify-content:space-around;
border-top:1px solid #222;
padding-top:14px;

}

.tab{

font-size:32px;
color:#cfcfcf;

}

.active{

color:white;

}

/* Posts */

.posts{

margin-top:14px;
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:3px;

}

.post{

position:relative;
aspect-ratio:1/1;
overflow:hidden;

}

.post img{

width:100%;
height:100%;
object-fit:cover;

}

.reel-icon{

position:absolute;
top:10px;
right:10px;
font-size:26px;
color:white;

}

/* Bottom Nav */

.bottom-nav{

position:fixed;
bottom:0;
left:0;
width:100%;
height:74px;
background:#000814;
border-top:1px solid #1f2937;
display:flex;
justify-content:space-around;
align-items:center;
z-index:100;

}

.bottom-nav i{

font-size:34px;
color:white;

}

.profile-mini{

width:38px;
height:38px;
border-radius:50%;
overflow:hidden;

}

.profile-mini img{

width:100%;
height:100%;
object-fit:cover;

}

.notification-dot{

position:absolute;
top:-2px;
right:-4px;
background:red;
width:22px;
height:22px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
font-weight:700;

}

</style>

</head>
