<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Appnetick Profile</title>
  <link rel="icon" href="/20260314_091747.png">

<meta property="og:image" content="https://appnetick-link.vercel.app/20260314_091747.png">
<meta property="og:site_name" content="Appnetick">
  <meta property="og:image" content="IMAGE_URL">
<meta property="og:title" content="User Profile">
<meta property="og:description" content="View profile on Appnetick">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://unpkg.com/@phosphor-icons/web"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#000814;
color:white;
overflow-x:hidden;
}

.container{
max-width:500px;
margin:auto;
padding-bottom:40px;
}

/* TOP BAR */
.topbar{
height:70px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 18px;
position:sticky;
top:0;
z-index:100;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(20px);
}

.left-top{
display:flex;
align-items:center;
gap:14px;
}

.top-icon{
font-size:34px;
color:white;
}

.username-top{
font-size:22px;
font-weight:700;
}

/* PROFILE */
.profile-header{
padding:30px 22px 0;
text-align:center;
}

.profile-image{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
border:3px solid #222;
}

.name{
margin-top:18px;
font-size:28px;
font-weight:700;
}

.bio{
margin-top:10px;
font-size:18px;
line-height:1.7;
color:#f0f0f0;
}

.stats{
display:flex;
justify-content:space-around;
margin-top:34px;
}

.stat h2{
font-size:30px;
font-weight:700;
}

.stat p{
margin-top:4px;
font-size:18px;
color:#cfcfcf;
}

.loading{
opacity:0.6;
}

</style>

</head>

<body>

<div class="container">

<!-- TOP BAR -->
<div class="topbar">

<div class="left-top">
<i class="ph ph-plus top-icon"></i>
<div class="username-top" id="usernameTop">loading...</div>
</div>

<i class="ph ph-list top-icon"></i>

</div>

<!-- PROFILE -->
<div class="profile-header">

<img class="profile-image" id="profileImg"
src="https://via.placeholder.com/120">

<div class="name" id="name">Loading...</div>

<div class="bio" id="bio">Please wait...</div>

<!-- STATS -->
<div class="stats">

<div class="stat">
<h2 id="posts">0</h2>
<p>posts</p>
</div>

<div class="stat">
<h2 id="followers">0</h2>
<p>followers</p>
</div>

<div class="stat">
<h2 id="following">0</h2>
<p>following</p>
</div>

</div>

</div>

</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
get
} 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* YOUR EXACT FIREBASE CONFIG (NO CHANGE) */
const firebaseConfig = {
apiKey: "AIzaSyBGIQFj6syU2231sov7c5i_90O0s6olCxlM",
authDomain: "appnetick.firebaseapp.com",
databaseURL: "https://appnetick-default-rtdb.firebaseio.com",
projectId: "appnetick",
storageBucket: "appnetick.firebasestorage.app",
messagingSenderId: "816276009696",
appId: "1:816276009696:web:db763c2ae70d2b944c9685"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* UID FROM URL */
const pathParts = window.location.pathname.split("/");
const uid = pathParts[pathParts.length - 1];
async function loadProfile(){

if(!uid){
document.getElementById("name").innerText = "No UID";
return;
}

const snap = await get(ref(db, "Users/" + uid));

if(snap.exists()){

const data = snap.val();

/* 🔥 EXACT YOUR FIREBASE FIELDS */
document.getElementById("name").innerText = data.full_name || "No Name";
document.getElementById("usernameTop").innerText = data.Username || "user";
document.getElementById("bio").innerText = data.email || "";

// ✅ PROFILE IMAGE FIX
  document.getElementById("profileImg").src =
    data.avatar ||
    data.profilePic ||
    data.photo ||
    "https://via.placeholder.com/120";


/* stats (optional) */
document.getElementById("posts").innerText = 0;
document.getElementById("followers").innerText = 0;
document.getElementById("following").innerText = 0;

}else{

document.getElementById("name").innerText = "User Not Found";
document.getElementById("bio").innerText = "";

}

}

loadProfile().catch(console.error);

</script>

</body>
</html>
