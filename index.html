<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Appnetick</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- Phosphor Icons -->

<script src="https://unpkg.com/@phosphor-icons/web"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:linear-gradient(135deg,#2753ff,#2d46ff,#3f63ff);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
position:relative;
padding:20px;

}

/* Background Curves */

.curve1{

position:absolute;
width:900px;
height:900px;
border:12px solid rgba(255,255,255,0.9);
border-radius:50%;
top:-600px;
left:-200px;

}

.curve2{

position:absolute;
width:800px;
height:800px;
border:12px solid rgba(255,255,255,0.9);
border-radius:50%;
bottom:-520px;
right:-250px;

}

/* Main Wrapper */

.wrapper{

display:flex;
gap:30px;
z-index:10;
flex-wrap:wrap;
justify-content:center;

}

/* Cards */

.card{

width:340px;
background:rgba(255,255,255,0.92);
backdrop-filter:blur(20px);
border-radius:36px;
padding:28px;
box-shadow:0 20px 60px rgba(0,0,0,0.18);
position:relative;
overflow:hidden;

}

/* Left Menu Card */

.left-card::before{

content:"";
position:absolute;
width:240px;
height:240px;
background:rgba(255,255,255,0.7);
border-radius:50%;
top:-80px;
left:-90px;

}

/* Top User */

.mini-user{

display:flex;
align-items:center;
gap:18px;
margin-top:70px;
margin-bottom:80px;
position:relative;
z-index:2;

}

.mini-user img{

width:62px;
height:62px;
border-radius:50%;
object-fit:cover;

}

.mini-user h2{

font-size:20px;
font-weight:500;
color:#111;

}

/* Menu */

.menu{

display:flex;
flex-direction:column;
gap:32px;

}

.menu-item{

display:flex;
align-items:center;
gap:18px;
font-size:20px;
color:#222;
font-weight:500;

}

.menu-item i{

font-size:28px;
color:#5b45ff;

}

/* Right Card */

.topbar{

display:flex;
align-items:center;
justify-content:space-between;

}

.topbar i{

font-size:30px;
color:#111;

}

.topbar h1{

font-size:24px;
font-weight:600;
color:#111;

}

/* Profile */

.profile{

display:flex;
flex-direction:column;
align-items:center;
margin-top:28px;

}

.profile img{

width:150px;
height:150px;
border-radius:50%;
object-fit:cover;

}

.profile-name{

margin-top:22px;
font-size:24px;
font-weight:600;
color:#111;

}

.location{

display:flex;
align-items:center;
gap:8px;
margin-top:8px;
font-size:15px;
color:#555;

}

.location i{

color:#5b45ff;
font-size:18px;

}

/* Stats */

.stats{

margin-top:38px;
display:flex;
justify-content:space-around;
text-align:center;

}

.stat h2{

font-size:34px;
font-weight:700;
color:#111;

}

.stat p{

margin-top:6px;
font-size:17px;
color:#444;

}

/* Recent Work */

.section-title{

margin-top:40px;
font-size:22px;
font-weight:600;
color:#111;

}

.work-card{

margin-top:20px;
border-radius:28px;
overflow:hidden;
position:relative;

}

.work-card img{

width:100%;
height:220px;
object-fit:cover;

}

/* Overlay */

.overlay{

position:absolute;
inset:0;
background:linear-gradient(
to right,
rgba(112,72,255,0.55),
rgba(255,255,255,0.1)
);

}

.play-btn{

position:absolute;
right:24px;
bottom:24px;
width:78px;
height:78px;
border-radius:50%;
background:white;
display:flex;
justify-content:center;
align-items:center;
box-shadow:0 10px 30px rgba(0,0,0,0.18);

}

.play-btn i{

font-size:34px;
color:#5b45ff;

}

/* Responsive */

@media(max-width:900px){

.wrapper{

flex-direction:column;

}

}

</style>

</head>

<body>

<div class="curve1"></div>
<div class="curve2"></div>

<div class="wrapper">

<!-- LEFT CARD -->

<div class="card left-card">

<div class="mini-user">

<img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=1200&auto=format&fit=crop">

<h2>Shreya Ghosal</h2>

</div>

<div class="menu">

<div class="menu-item">

<i class="ph ph-user"></i>

<span>Profile</span>

</div>

<div class="menu-item">

<i class="ph ph-bell"></i>

<span>Notification</span>

</div>

<div class="menu-item">

<i class="ph ph-gear"></i>

<span>Settings</span>

</div>

<div class="menu-item">

<i class="ph ph-lifebuoy"></i>

<span>Help & Support</span>

</div>

</div>

</div>

<!-- RIGHT CARD -->

<div class="card">

<div class="topbar">

<i class="ph ph-caret-left"></i>

<h1>Profile</h1>

<div></div>

</div>

<div class="profile">

<img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=1200&auto=format&fit=crop">

<div class="profile-name">

Shreya Ghosal

</div>

<div class="location">

<i class="ph ph-paper-plane-tilt-fill"></i>

<span>London</span>

</div>

</div>

<div class="stats">

<div class="stat">

<h2>1167</h2>

<p>Following</p>

</div>

<div class="stat">

<h2>1227</h2>

<p>Followers</p>

</div>

</div>

<div class="section-title">

Recent Work

</div>

<div class="work-card">

<img src="https://images.unsplash.com/photo-1497366754035-f200968a6e72?q=80&w=1200&auto=format&fit=crop">

<div class="overlay"></div>

<div class="play-btn">

<i class="ph-fill ph-play"></i>

</div>

</div>

</div>

</div>

</body>

</html>
