<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Appnetick Profile</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://unpkg.com/@phosphor-icons/web"></script>

<style>

/* (YOUR FULL CSS SAME AS YOU SENT — NO CHANGE) */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#000814;
color:white;
overflow-x:hidden;
}

.container{
max-width:500px;
margin:auto;
padding-bottom:40px;
}

  /* Top Bar */

.topbar{

height:70px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 18px;
position:sticky;
top:0;
z-index:100;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(20px);

}

.left-top{

display:flex;
align-items:center;
gap:14px;

}

.top-icon{

font-size:34px;
color:white;

}

.username-top{

font-size:22px;
font-weight:700;

}

.right-top{

display:flex;
align-items:center;
gap:18px;

}

.icon-wrap{

position:relative;

}

.badge{

position:absolute;
top:-8px;
right:-8px;
background:#ff3040;
width:22px;
height:22px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
font-weight:700;

}

/* Profile */

.profile-header{

padding:30px 22px 0;
text-align:center;

}

.profile-left{

position:relative;
width:120px;
margin:auto;

}

.profile-image{

width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
border:3px solid #222;

}

.add-btn{

position:absolute;
right:0;
bottom:4px;
width:36px;
height:36px;
border-radius:50%;
background:white;
display:flex;
justify-content:center;
align-items:center;
border:4px solid #000814;

}

.add-btn i{

color:black;
font-size:20px;

}

/* Name */

.name{

margin-top:18px;
font-size:28px;
font-weight:700;

}

.bio{

margin-top:10px;
font-size:18px;
line-height:1.7;
color:#f0f0f0;

}

.link{

margin-top:10px;
display:flex;
align-items:center;
justify-content:center;
gap:8px;
color:#8ea7ff;
font-size:19px;
font-weight:500;

}

.link i{

font-size:22px;

}

/* Stats */

.stats{

display:flex;
justify-content:space-around;
margin-top:34px;

}

.stat{

text-align:center;

}

.stat h2{

font-size:30px;
font-weight:700;

}

.stat p{

margin-top:4px;
font-size:18px;
color:#cfcfcf;

}

/* Open App Button */

.open-app{

margin-top:34px;

}

.open-btn{

width:100%;
height:62px;
border-radius:22px;
border:2px solid rgba(255,255,255,0.2);
background:rgba(255,255,255,0.04);
backdrop-filter:blur(10px);
color:white;
font-size:24px;
font-weight:700;
display:flex;
align-items:center;
justify-content:center;
gap:12px;

}

.open-btn i{

font-size:30px;

}

/* --- KEEP ALL YOUR CSS AS IT IS (UNCHANGED) --- */

</style>

</head>

<body>

<div class="container">

<!-- Topbar -->
<div class="topbar">

<div class="left-top">

<i class="ph ph-plus top-icon"></i>

<div class="username-top" id="usernameTop">
loading...
</div>

<i class="ph-fill ph-caret-down"></i>

<div style="width:12px;height:12px;background:red;border-radius:50%;"></div>

</div>

<div class="right-top">

<div class="icon-wrap">
<i class="ph ph-threads-logo top-icon"></i>
<div class="badge">7</div>
</div>

<i class="ph ph-list top-icon"></i>

</div>

</div>

<!-- Profile -->
<div class="profile-header">

<div class="profile-left">

<img class="profile-image" id="profileImg"
src="https://via.placeholder.com/120">

<div class="add-btn">
<i class="ph-bold ph-plus"></i>
</div>

</div>

<div class="name" id="name">
Loading...
</div>

<div class="bio" id="bio">
Please wait...
</div>

<div class="link">

<i class="ph ph-link-simple"></i>

<span>appnetick.com</span>

</div>

<!-- Stats -->
<div class="stats">

<div class="stat">
<h2 id="posts">0</h2>
<p>posts</p>
</div>

<div class="stat">
<h2 id="followers">0</h2>
<p>followers</p>
</div>

<div class="stat">
<h2 id="following">0</h2>
<p>following</p>
</div>

</div>

<!-- Open App -->
<div class="open-app">

<button class="open-btn">
<span>Open in App</span>
<i class="ph ph-arrow-up-right"></i>
</button>

</div>

</div>

</div>

<script type="module">

import { initializeApp } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getDatabase,
  ref,
  get
} 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "users-f0dd7.firebaseapp.com",
  databaseURL: "https://users-f0dd7-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "users-f0dd7",
  storageBucket: "users-f0dd7.appspot.com",
  messagingSenderId: "747543481819",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* UID FROM URL */
/* /profile/:uid */
const path = window.location.pathname.split("/");
const uid = path[2];

async function loadProfile() {

  if (!uid) return;

  const snap = await get(ref(db, "Users/" + uid));

  if (snap.exists()) {

    const data = snap.val();

    document.getElementById("name").innerText = data.name || "No Name";
    document.getElementById("bio").innerText = data.bio || "";
    document.getElementById("usernameTop").innerText = data.username || "user";

    document.getElementById("profileImg").src =
      data.profilePic || "https://via.placeholder.com/120";

    document.getElementById("posts").innerText = data.posts || 0;
    document.getElementById("followers").innerText = data.followers || 0;
    document.getElementById("following").innerText = data.following || 0;

  } else {
    document.getElementById("name").innerText = "User Not Found";
  }
}

loadProfile();

</script>

</body>

</html>
