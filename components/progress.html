<!-- PROGRESS DIALOG --><div id="progressDialog" class="progress-overlay">  <div class="progress-box"><div id="progressText">Processing...</div>

<div class="loader"></div>

  </div></div><style>
.progress-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
visibility:hidden;
opacity:0;
transition:0.3s;
}

.progress-overlay.active{
visibility:visible;
opacity:1;
}

.progress-box{
background:#111;
padding:25px;
border-radius:20px;
text-align:center;
width:220px;
}

/* TEXT */
#progressText{
margin-bottom:15px;
font-size:16px;
}

/* LOADER */
.loader{
width:35px;
height:35px;
border:4px solid #333;
border-top:4px solid #2196f3;
border-radius:50%;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}
</style><script>
function showProgress(text){
document.getElementById("progressText").innerText = text || "Processing...";
document.getElementById("progressDialog").classList.add("active");
}

function hideProgress(){
document.getElementById("progressDialog").classList.remove("active");
}
</script>
